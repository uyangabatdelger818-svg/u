<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uyanga Portfolio</title>

<style>
body{
margin:0;
background:#0b0b0b;
color:white;
font-family:serif;
overflow-x:hidden;
cursor:none;
}

/* CUSTOM CURSOR */
.custom-cursor{
width:20px;
height:20px;
border:1px solid white;
border-radius:50%;
position:fixed;
pointer-events:none;
transform:translate(-50%,-50%);
z-index:9999;
transition:transform 0.08s ease;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
overflow:hidden;
text-align:center;
}

/* CLEAN GLITCH */
.glitch{
font-size:70px;
position:relative;
animation:glitch 1.5s infinite;
}

.glitch::before,
.glitch::after{
content:attr(data-text);
position:absolute;
left:0;
top:0;
}

.glitch::before{
color:#ff004c;
transform:translate(-2px,-2px);
}

.glitch::after{
color:#00e1ff;
transform:translate(2px,2px);
}

@keyframes glitch{
0%{text-shadow:2px 2px #ff004c;}
50%{text-shadow:-2px -2px #00e1ff;}
100%{text-shadow:2px -2px #ff004c;}
}

/* TAGLINE */
.tagline{
margin-top:20px;
font-size:14px;
opacity:0.7;
letter-spacing:2px;
}

/* PROFILE IMAGE */
.profile{
width:230px;
margin-top:40px;
border-radius:20px;
filter:grayscale(100%);
transition:0.6s;
box-shadow:0 0 60px rgba(255,255,255,0.08);
}

.profile:hover{
filter:grayscale(0%);
transform:scale(1.05);
}

/* DOODLES */
.doodle{
position:absolute;
width:90px;
opacity:0.6;
transition:transform 0.2s;
}

#d1{top:15%;left:10%;}
#d2{bottom:20%;right:20%;}
#d3{top:70%;left:25%;}

/* FILM GRAIN */
.film-grain{
position:absolute;
width:100%;
height:100%;
background:url("https://grainy-gradients.vercel.app/noise.svg");
opacity:0.05;
pointer-events:none;
}

/* SPOTLIGHT */
.spotlight{
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle at center, rgba(255,255,255,0.07), transparent 45%);
pointer-events:none;
}

/* SECOND SECTION */
.about{
min-height:100vh;
padding:150px 20px;
text-align:center;
opacity:0;
transform:translateY(100px);
transition:1.2s ease;
background:#0d0d0d;
}

.about.show{
opacity:1;
transform:translateY(0);
}

.about h2{
font-size:40px;
margin-bottom:20px;
letter-spacing:2px;
}

.about p{
max-width:600px;
margin:auto;
opacity:0.8;
line-height:1.8;
}
</style>
</head>

<body>

<div class="custom-cursor"></div>

<section class="hero">

<div class="film-grain"></div>
<div class="spotlight"></div>

<h1 class="glitch" data-text="ᠤᠶᠠᠩᠭ᠎ᠠ ᠪᠠᠲᠤᠳᠡᠯᢉᠡᠷ">
ᠤᠶᠠᠩᠭ᠎ᠠ ᠪᠠᠲᠤᠳᠡᠯᢉᠡᠷ
</h1>

<p class="tagline">obsessed with aesthetic & midnight thoughts</p>

<img src="your-photo.png" class="profile">

<img src="star.png" class="doodle" id="d1">
<img src="scribble.png" class="doodle" id="d2">
<img src="heart.png" class="doodle" id="d3">

</section>

<section class="about">
<h2>Миний тухай</h2>
<p>
Сайн уу, би Уянга. Аестетик, хөгжим, дизайн, шөнийн 2 цагийн бодлуудад дуртай.
Энэ бол миний дижитал ертөнц — дурсамж, мэдрэмж, бүтээлүүдийн цуглуулга.
</p>
</section>

<script>

/* CUSTOM CURSOR */
const cursor=document.querySelector(".custom-cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

/* DOODLE PARALLAX */
document.addEventListener("mousemove",e=>{
document.querySelectorAll(".doodle").forEach(doodle=>{
let speed=0.02;
let x=(window.innerWidth - e.pageX * speed);
let y=(window.innerHeight - e.pageY * speed);
doodle.style.transform=`translate(${x/20}px, ${y/20}px)`;
});
});

/* CINEMATIC SCROLL */
const about=document.querySelector(".about");
window.addEventListener("scroll",()=>{
const trigger=window.innerHeight*0.8;
const top=about.getBoundingClientRect().top;
if(top<trigger){
about.classList.add("show");
}
});

</script>

</body>
</html>
